    <!-- Noto Sans Hebrew — the single app typeface. Four weights only
         (regular / bold / extrabold / black) — covers body, headings and
         the heavy display numerals. Heebo, Frank Ruhl Libre and JetBrains
         Mono were dropped: 15 font files down to 4, a big mobile win. -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@400;700;800;900&display=swap" rel="stylesheet" />
    <!-- Preconnect to Unsplash so the booking-page hero image starts its
         TLS handshake in parallel with the JS download instead of waiting
         for hydration. -->
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <title>Toron — ניהול תורים מקצועי</title>
    <!-- Google Identity Services library. Used by AuthPage to sign in
         with Google in iOS PWA without leaving the app (signInWithRedirect
         doesn't come back to the PWA — iOS opens the callback in Safari).
         The script is harmless when not used. -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Accessibility prefs FOUC bootstrap — applies persisted IS 5568 user prefs
         to <html> classes synchronously before React hydrates. Keep in sync
         with src/utils/a11yPrefs.js A11Y_BOOTSTRAP_SCRIPT. -->
    <script>
      (function(){try{var raw=localStorage.getItem("toron_a11y_prefs_v1");if(!raw)return;var p=JSON.parse(raw);if(p.version!==1)return;var c=document.documentElement.classList;c.toggle("a11y-links",!!p.links);c.toggle("a11y-contrast-high",p.contrast==='high');c.toggle("a11y-contrast-invert",p.contrast==='invert');c.toggle("a11y-contrast-mono",p.contrast==='mono');c.toggle("a11y-text-115",p.textSize===115);c.toggle("a11y-text-130",p.textSize===130);c.toggle("a11y-text-150",p.textSize===150);c.toggle("a11y-lines-16",p.lineSpacing==='16');c.toggle("a11y-lines-20",p.lineSpacing==='20');c.toggle("a11y-readable-font",!!p.readableFont);c.toggle("a11y-headings",!!p.headings);c.toggle("a11y-cursor-black",!!p.cursorBlack);c.toggle("a11y-cursor-large",!!p.cursorLarge);c.toggle("a11y-reduce-motion",!!p.reduceMotion);}catch(e){}})();
    </script>
  </head>
